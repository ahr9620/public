<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { width: 100%; height: 100%; overflow: hidden; background: transparent; }
  #ascii-container {
    width: 100%; height: 100%;
    overflow: hidden;
  }
  #ascii-container > div {
    font-family: 'JetBrains Mono', monospace !important;
    line-height: 1 !important;
    font-size: 6px !important;
    letter-spacing: 0.10em !important;
    pointer-events: none;
  }
</style>
</head>
<body>
<div id="ascii-container"></div>
<script type="module">
import * as THREE from 'https://unpkg.com/three@0.169.0/build/three.module.js';
import { AsciiEffect } from 'https://unpkg.com/three@0.169.0/examples/jsm/effects/AsciiEffect.js';

const container = document.getElementById('ascii-container');

const isDark = new URLSearchParams(location.search).get('dark') === '1';
const fgColor = isDark ? '#BCB5A6' : '#221E19';
const bgColor = 'transparent';

const W  = container.clientWidth  || window.innerWidth;
const H  = container.clientHeight || window.innerHeight;
const EH = H + 20; 

const scene    = new THREE.Scene();
const camera   = new THREE.PerspectiveCamera(75, W / EH, 0.1, 100);
camera.position.z = 5;

const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setClearColor(0x000000, 0);
renderer.setSize(W, EH);

const effect = new AsciiEffect(renderer, ' .:-+*=%@#', { invert: true });
effect.setSize(W, EH);
effect.domElement.style.color = fgColor;
effect.domElement.style.backgroundColor = bgColor;
container.appendChild(effect.domElement);

const count = 600;
const positions = new Float32Array(count * 3);
const baseX     = new Float32Array(count);
const baseZ     = new Float32Array(count);
const sineAmp   = new Float32Array(count);
const sineFreq  = new Float32Array(count);

const tLoader = new THREE.TextureLoader();
const particlesTexture = tLoader.load('images/particles.png');
particlesTexture.colorSpace = THREE.SRGBColorSpace;

for (let i = 0; i < count; i++) {
  const i3 = i * 3;
  baseX[i] = (Math.random() - 0.5) * 10;
  baseZ[i] = (Math.random() - 0.5) * 10;
  positions[i3]     = baseX[i];
  positions[i3 + 1] = (Math.random() - 0.5) * 10;
  positions[i3 + 2] = baseZ[i];
  sineAmp[i]  = 0.15 + Math.random() * 0.35;
  sineFreq[i] = 0.15 + Math.random() * 0.5;
}

const geometry    = new THREE.BufferGeometry();
const positionAttr = new THREE.BufferAttribute(positions, 3);
positionAttr.setUsage(THREE.DynamicDrawUsage);
geometry.setAttribute('position', positionAttr);

const material = new THREE.PointsMaterial({
  color: 0xffffff,
  size: 1,
  map: particlesTexture,
  transparent: true,
  depthWrite: false,
  blending: THREE.AdditiveBlending,
});

const points = new THREE.Points(geometry, material);
scene.add(points);

const light = new THREE.AmbientLight(0xffffff, 1);
scene.add(light);

window.addEventListener('resize', () => {
  const w  = container.clientWidth  || window.innerWidth;
  const h  = container.clientHeight || window.innerHeight;
  const eh = h + 20;
  renderer.setSize(w, eh);
  effect.setSize(w, eh);
  camera.aspect = w / eh;
  camera.updateProjectionMatrix();
});

window.addEventListener('message', e => {
  if (e.data && e.data.type === 'theme') {
    effect.domElement.style.color = e.data.dark ? '#BCB5A6' : '#221E19';
  }
});

const clock = new THREE.Clock();
function animate() {
  requestAnimationFrame(animate);
  const t = clock.getElapsedTime();
  const floatDownSpeed = 0.22;
  for (let i = 0; i < count; i++) {
    const i3 = i * 3;
    positions[i3]     = baseX[i] + sineAmp[i] * Math.sin(t * sineFreq[i]);
    positions[i3 + 2] = baseZ[i] + sineAmp[i] * Math.cos(t * sineFreq[i]);
    positions[i3 + 1] -= floatDownSpeed * 0.013;
    if (positions[i3 + 1] < -5) positions[i3 + 1] = 5;
  }
  positionAttr.needsUpdate = true;
  effect.render(scene, camera);
}
animate();
</script>
</body>
</html>
